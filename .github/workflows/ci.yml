name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # flux_verify uses nightly + cargo-flux; checked in .github/workflows/flux.yml
  WORKSPACE_EXCLUDE: --exclude flux_verify

jobs:
  rust:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Devbox toolchain
        uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          # Binaries and fingerprints in target/ bake in nix store paths;
          # invalidate whenever the devbox environment changes.
          prefix-key: nix-${{ hashFiles('devbox.lock') }}

      - name: Install Python Aer + lit deps
        run: devbox run ci-python

      - name: cargo fmt
        run: devbox run -- cargo fmt --all -- --check

      - name: cargo clippy
        run: devbox run -- cargo clippy --workspace ${{ env.WORKSPACE_EXCLUDE }} --all-targets -- -D warnings

      - name: cargo build --release
        run: devbox run -- cargo build --release --workspace ${{ env.WORKSPACE_EXCLUDE }}

      - name: cargo build --examples (lit test oracle binaries, issue #28)
        run: devbox run -- cargo build --examples --workspace ${{ env.WORKSPACE_EXCLUDE }}

      - name: cargo test
        run: devbox run ci

      - name: Python Aer verification
        env:
          QUONC: target/release/quonc
        run: |
          devbox run -- .venv/bin/python test/verify/bell.py
          devbox run -- .venv/bin/python test/verify/teleport.py
          devbox run -- .venv/bin/python test/verify/bernstein_vazirani.py
          devbox run -- .venv/bin/python test/verify/routing.py
          devbox run -- .venv/bin/python test/verify/grover.py
          devbox run -- .venv/bin/python test/verify/qft.py
          devbox run -- .venv/bin/python test/verify/ising.py
          devbox run -- .venv/bin/python test/verify/qaoa.py
          devbox run -- .venv/bin/python test/verify/shor.py

  docs:
    name: docs site build (website/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert validation docs match CI reality (issue #203)
        run: ./scripts/assert-validation-docs.sh

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: website/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: website
        run: pnpm build

  tooling:
    name: quonfmt · quonlint · LSP smoke
    runs-on: ubuntu-latest
    # Allow cold Devbox/Nix LLVM cache fill; warm runs stay well under this.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Devbox toolchain
        uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tooling
          prefix-key: nix-${{ hashFiles('devbox.lock') }}

      - name: Build tooling binaries
        run: devbox run tooling-build

      - name: quonfmt --check (CI corpus)
        run: devbox run -- ./scripts/tooling-check.sh --ci --fmt-only

      - name: quonlint (CI corpus)
        run: devbox run -- ./scripts/tooling-check.sh --ci --lint-only

      - name: LSP smoke tests
        run: devbox run -- cargo test --release -p quon_lsp --test smoke -- --include-ignored
