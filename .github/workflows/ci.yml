name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  MLIR_SYS_220_PREFIX: /usr/lib/llvm-22
  # flux_verify uses nightly + cargo-flux; checked in .github/workflows/flux.yml
  WORKSPACE_EXCLUDE: --exclude flux_verify

jobs:
  rust:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22, MLIR, and libz3
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common libz3-dev
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y libmlir-22-dev mlir-22-tools llvm-22-dev libpolly-22-dev
          echo "/usr/lib/llvm-22/bin" >> "$GITHUB_PATH"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace ${{ env.WORKSPACE_EXCLUDE }} --all-targets -- -D warnings

      - name: cargo build --release
        run: cargo build --release --workspace ${{ env.WORKSPACE_EXCLUDE }}

      - name: cargo test
        run: cargo test --workspace ${{ env.WORKSPACE_EXCLUDE }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qiskit Aer verifier dependencies
        run: python -m pip install qiskit qiskit-aer qiskit_qasm3_import

      - name: Python Aer verification
        env:
          QUONC: target/release/quonc
        run: |
          python test/verify/bell.py
          python test/verify/teleport.py
          python test/verify/bernstein_vazirani.py
          python test/verify/routing.py
