name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  MLIR_SYS_220_PREFIX: /usr/lib/llvm-22
  # flux_verify uses nightly + cargo-flux; checked in .github/workflows/flux.yml
  WORKSPACE_EXCLUDE: --exclude flux_verify

jobs:
  rust:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22, MLIR, and libz3
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common libz3-dev
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y libmlir-22-dev mlir-22-tools llvm-22-dev llvm-22-tools libpolly-22-dev
          echo "/usr/lib/llvm-22/bin" >> "$GITHUB_PATH"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lit (drives test/lit/ FileCheck suite, issue #28)
        run: python -m pip install lit

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace ${{ env.WORKSPACE_EXCLUDE }} --all-targets -- -D warnings

      - name: cargo build --release
        run: cargo build --release --workspace ${{ env.WORKSPACE_EXCLUDE }}

      - name: cargo build --examples (lit test oracle binaries, issue #28)
        run: cargo build --examples --workspace ${{ env.WORKSPACE_EXCLUDE }}

      - name: cargo test
        run: cargo test --workspace ${{ env.WORKSPACE_EXCLUDE }}

      - name: Install Qiskit Aer verifier dependencies
        run: python -m pip install qiskit qiskit-aer qiskit_qasm3_import

      - name: Python Aer verification
        env:
          QUONC: target/release/quonc
        run: |
          python test/verify/bell.py
          python test/verify/teleport.py
          python test/verify/bernstein_vazirani.py
          python test/verify/routing.py
          python test/verify/grover.py
          python test/verify/qft.py
          python test/verify/ising.py
          python test/verify/qaoa.py
          python test/verify/shor.py

  docs:
    name: docs site build (website/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: website/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: website
        run: pnpm build

  tooling:
    name: quonfmt · quonlint · LSP smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22, MLIR, and libz3
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common libz3-dev
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y libmlir-22-dev mlir-22-tools llvm-22-dev llvm-22-tools libpolly-22-dev
          echo "/usr/lib/llvm-22/bin" >> "$GITHUB_PATH"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tooling

      - name: Build tooling binaries
        run: cargo build --release -p quonfmt -p quonlint-cli -p quon_lsp

      - name: quonfmt --check (CI corpus)
        run: ./scripts/tooling-check.sh --ci --fmt-only

      - name: quonlint (CI corpus)
        run: ./scripts/tooling-check.sh --ci --lint-only

      - name: LSP smoke tests
        run: cargo test --release -p quon_lsp --test smoke -- --include-ignored
