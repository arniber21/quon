name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # flux_verify uses nightly + cargo-flux; checked in .github/workflows/flux.yml
  WORKSPACE_EXCLUDE: --exclude flux_verify

jobs:
  rust:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Devbox toolchain
        uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          # Binaries and fingerprints in target/ bake in nix store paths;
          # invalidate whenever the devbox environment changes.
          prefix-key: nix-${{ hashFiles('devbox.lock') }}

      - name: CI rust gates (Justfile)
        run: devbox run -- just ci-rust

      - name: Sample corpus catalog lint (Justfile, ADR-0025 / #185)
        run: devbox run -- just ci-samples

  docs:
    name: docs site build (website/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: extractions/setup-just@v4

      - name: Assert validation docs match Justfile / CI reality
        run: just ci-docs-assert

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: website/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Website build (Justfile)
        run: just ci-website

  tooling:
    name: quonfmt · quonlint · LSP smoke
    runs-on: ubuntu-latest
    # Allow cold Devbox/Nix LLVM cache fill; warm runs stay well under this.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Devbox toolchain
        uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tooling
          prefix-key: nix-${{ hashFiles('devbox.lock') }}

      - name: CI tooling gates (Justfile)
        run: devbox run -- just ci-tooling
