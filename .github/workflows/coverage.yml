name: Coverage

on:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  WORKSPACE_EXCLUDE: --exclude flux_verify

jobs:
  llvm-cov:
    name: cargo llvm-cov (summary)
    runs-on: ubuntu-latest
    # Informational only: coverage must never block a merge. Keep it off the
    # required-checks list and bound its runtime so it cannot wedge CI.
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Devbox toolchain
        uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - uses: Swatinem/rust-cache@v2

      - name: Coverage summary
        run: devbox run coverage
