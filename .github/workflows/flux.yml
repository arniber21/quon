name: Flux

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "flux_verify/**"
      - "backend/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/flux.yml"

permissions:
  contents: read

jobs:
  flux:
    name: refinement types (flux_verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev

      - name: Install Flux
        run: curl -fsSL https://raw.githubusercontent.com/flux-rs/flux/main/install.sh | bash

      - name: cargo flux (flux_verify)
        run: cargo flux -p flux_verify

      - name: cargo flux (backend)
        run: cargo flux -p backend --features flux
