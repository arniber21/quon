name: Flux

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "flux_verify/**"
      - "backend/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/flux.yml"

permissions:
  contents: read

jobs:
  flux:
    name: refinement types (flux_verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install z3
        # `z3` provides the solver binary that liquid-fixpoint spawns at
        # runtime; `libz3-dev` alone is not enough.
        run: sudo apt-get update && sudo apt-get install -y z3 libz3-dev

      - name: Install Flux
        run: |
          set -euo pipefail
          BIN="$HOME/.cargo/bin"
          mkdir -p "$BIN"
          curl -fsSL "https://github.com/ucsd-progsys/liquid-fixpoint/releases/download/nightly/fixpoint-x86_64-linux-gnu.tar.gz" | tar xz -C "$BIN"
          chmod +x "$BIN/fixpoint"
          git clone --depth 1 https://github.com/flux-rs/flux /tmp/flux
          (cd /tmp/flux && cargo xtask install)

      - name: cargo flux (flux_verify)
        run: cargo flux -p flux_verify

      - name: cargo flux (backend)
        run: cargo flux -p backend --features flux
