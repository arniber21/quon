name: VS Code extension

on:
  push:
    paths:
      - "extensions/vscode-quon/**"
      - "tree-sitter-quon/**"
      - ".github/workflows/vscode-extension.yml"
      - "quon_lsp/**"
      - "quonfmt/**"
  pull_request:
    paths:
      - "extensions/vscode-quon/**"
      - "tree-sitter-quon/**"
      - ".github/workflows/vscode-extension.yml"
      - "quon_lsp/**"
      - "quonfmt/**"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  tree-sitter:
    name: tree-sitter-quon corpus
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tree-sitter-quon/package-lock.json

      - name: tree-sitter test
        working-directory: tree-sitter-quon
        run: |
          npm ci
          npx tree-sitter test

  vscode-extension:
    name: compile · vsix · smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Devbox toolchain
        uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: true

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: vscode-extension
          prefix-key: nix-${{ hashFiles('devbox.lock') }}

      - name: Build quon_lsp and quonfmt
        run: devbox run lsp-vscode-build

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extensions/vscode-quon/package-lock.json

      - name: Install extension deps
        working-directory: extensions/vscode-quon
        run: npm ci

      - name: Compile
        working-directory: extensions/vscode-quon
        run: npm run compile

      - name: Package .vsix
        working-directory: extensions/vscode-quon
        run: npm run package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: quon-vscode-vsix
          path: extensions/vscode-quon/dist/*.vsix
          if-no-files-found: error

      # devbox run: the init_hook exports LD_LIBRARY_PATH for the nix libz3 the
      # release quon_lsp is dynamically linked against; outside devbox the LSP
      # binary fails to load and every request times out.
      - name: Extension smoke
        working-directory: extensions/vscode-quon
        run: devbox run --config ../.. -- xvfb-run -a npm test
        env:
          QUON_LSP_PATH: ${{ github.workspace }}/target/release/quon_lsp
          QUON_FMT_PATH: ${{ github.workspace }}/target/release/quonfmt
          QUON_LSP_DEBOUNCE_MS: "0"
