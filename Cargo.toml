[workspace]
members = ["quonc", "frontend", "zx", "mlir_bridge", "backend"]
resolver = "2"

[workspace.dependencies]
# Frontend
chumsky  = "0.9"
z3       = "0.12"
thiserror = "1"
ariadne  = "0.4"   # span-aware error reporting, pairs with chumsky

# ZX graph
petgraph = "0.6"

# MLIR/LLVM (LLVM 19 required — set LLVM_SYS_PREFIX if not on PATH)
melior = { version = "0.19", features = ["ods-dialects"] }

# Backend
serde      = { version = "1", features = ["derive"] }
serde_json = "1"

# Driver
clap = { version = "4", features = ["derive"] }

# Shared
anyhow = "1"

[profile.release]
lto = true
