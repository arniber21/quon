id: no-anyhow-in-lib-src
language: Rust
severity: warning
message: Avoid anyhow in library source — use thiserror enums and Result in crate APIs
note: |
  Reserve anyhow for the quonc CLI driver. Library crates (frontend, mlir_bridge,
  backend, zx) should expose typed errors. See docs/agents/code-quality.md.
ignores:
  - "quonc/**"
  - "quon_lsp/src/main.rs"
  - "**/tests/**"
  - "**/test/**"
  - "**/fuzz/**"
rule:
  any:
    - pattern: use anyhow::$REST
    - pattern: use anyhow
    - pattern: anyhow::Error
    - pattern: anyhow::Result
    - pattern: anyhow::bail!($$$)
    - pattern: anyhow::ensure!($$$)
    - kind: scoped_type_identifier
      regex: '^anyhow::'
